<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER SECURITY | Portfolyo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117; /* Siyah ekranın sebebi bu */
            color: #ffffff; /* Yazı rengi beyaz */
            line-height: 1.6;
        }
        .navbar {
            background-color: #161b22;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            position: fixed;
            top: 0;
            width: 100%;
            border-bottom: 1px solid #30363d;
            z-index: 1000;
        }
        .logo { color: #58a6ff; font-size: 1.5rem; font-weight: bold; }
        .nav-links { display: flex; list-style: none; margin-left: auto; }
        .nav-links li { margin-left: 30px; }
        .nav-links a { color: #8b949e; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover { color: #58a6ff; }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        .highlight { color: #58a6ff; }
        .btn {
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px;
            display: inline-block;
        }
        .primary { background-color: #238636; color: white; }
        .secondary { border: 1px solid #58a6ff; color: #58a6ff; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">CYBER SECURITY</div>
        <ul class="nav-links">
            <li><a href="#">Ana Sayfa</a></li>
            <li><a href="#">Analizler</a></li>
            <li><a href="#">İletişim</a></li>
        </ul>
    </nav>
    <section class="hero">
        <h1>Sistem <span class="highlight">Analizi</span></h1>
        <p>Endüstri Mühendisliği ve Siber Güvenlik Portfolyosu</p>
        <div>
            <a href="#" class="btn primary">Projeler</a>
            <a href="#" class="btn secondary">İletişim</a>
        </div>
    </section>
</body>
</html>
